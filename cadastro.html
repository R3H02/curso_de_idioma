<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cartão de Pagamento</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input, select {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .input-group {
            display: flex;
            justify-content: space-between;
        }

        .input-group input {
            width: 48%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Cadastro de Cartão</h2>
        <form id="form-cartao">
            <select name="tipo_cartao" required>
                <option value="" disabled selected>Selecione o tipo de cartão</option>
                <option value="debito">Cartão de Débito</option>
                <option value="credito">Cartão de Crédito</option>
            </select>

            <input type="text" name="nome" placeholder="Nome Completo" required>
            <input type="text" name="numero_cartao" placeholder="Número do Cartão" required>
            
            <div class="input-group">
                <input type="text" name="validade" placeholder="MM/AA" required>
                <input type="text" name="cvv" placeholder="CVV" required>
            </div>
            
            <input type="text" name="cpf" placeholder="CPF do Titular" required>

            <button type="submit">Cadastrar Cartão</button>
        </form>
    </div>

    <script>
        document.getElementById('form-cartao').addEventListener('submit', function(event) {
            event.preventDefault(); // Evita o envio padrão do formulário

            // Exibe um alerta para confirmar o cadastro
            alert('Cartão de ' + document.querySelector('select[name="tipo_cartao"]').value + ' cadastrado com sucesso!');
            
            // Aqui pode ser adicionada a lógica para envio dos dados ou redirecionamento
        });
    </script>

</body>
</html>
