<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento via Pix</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        #qrcode {
            margin: 20px auto; /* Alinhamento horizontal centralizado */
            display: flex;
            justify-content: center; /* Centraliza o conteúdo do QR Code */
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        p {
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Pagamento via Pix</h2>
        <p>Escaneie o código abaixo com o seu app de pagamento para realizar o pagamento via Pix.</p>
        <div id="qrcode"></div>
        <p><strong>Chave Pix:</strong>conexaolinguistica@gmail.com</p>
        <button id="gerarQRCode">Gerar QR Code</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        document.getElementById('gerarQRCode').addEventListener('click', function() {
            const chavePix = "pagamentoteste@exemplo.com";
            const valorPix = "R$200,00";
            const pixCode = `00020126330014BR.GOV.BCB.PIX0114${chavePix}5204000053039865405${valorPix.replace('R$', '')}5802BR5909Nome Exemplo6009Sao Paulo62070503***6304B14A`;

            // Limpa o QR code atual (se houver)
            document.getElementById("qrcode").innerHTML = "";

            // Gera um novo QR code
            const qrcode = new QRCode(document.getElementById("qrcode"), {
                text: pixCode,
                width: 256,
                height: 256
            });
        });
    </script>

</body>
</html>
